version: '3.8'

services:
  redis-7:
    image: redis:7-alpine
    container_name: redis-7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: chai_aur_redis
    volumes:
      - mongo-data:/data/db

volumes:
  redis-data:
  mongo-data:
